<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <link rel="stylesheet" href="test.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 Todo List</h1>

      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Nhập công việc..." />
        <button>Thêm</button>
      </div>

      <ul id="taskList">
        <li>Quét nhà</li>
        <li>Giặt quần áo</li>
      </ul>
    </div>
  </body>
</html>
<script>
    const tasks = "quet nha , giat quan ao " .split(",").map(task =>task.trim());
    function renderList(){
        const tasklist = document.getElementById("taskList");
        tasklist.innerHTML = "";
        tasks.forEach(task =>{
            const li = document.createElement("li");
            li.textContent = task;
            tasklist.appendChild(li);
        })
    }

    function addTask(){
        const taskInput = document.getElementById("taskInput");
        const taskName = taskInput.value.trim();
        if(taskName === ""){
            alert("Vui long nhap ten cong viec!");
            return;
        }
        tasks.push(taskName);
        renderList();
        taskInput.value = "";
    }
</script>
